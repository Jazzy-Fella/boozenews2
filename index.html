<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOOZE NEWZ P.100</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#cc0000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Booze Newz" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Teletext colour palette ── */
    :root {
      --tt-black:   #000000;
      --tt-red:     #dd0000;
      --tt-red2:    #ff2020;
      --tt-green:   #00cc00;
      --tt-yellow:  #ffff00;
      --tt-blue:    #1a1aff;
      --tt-cyan:    #00cccc;
      --tt-white:   #ffffff;
      --tt-dgrey:   #1a0000;
      --font: 'VT323', 'Courier New', monospace;
    }

    html, body {
      background: var(--tt-black);
      color: var(--tt-white);
      font-family: var(--font);
      font-size: 20px;
      line-height: 1.3;
      min-height: 100vh;
    }

    /* ── Page wrapper ── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      border-left: 4px solid #111;
      border-right: 4px solid #111;
      min-height: 100vh;
    }

    /* ── Ceefax status bar ── */
    .tt-statusbar {
      background: var(--tt-blue);
      color: var(--tt-white);
      font-family: var(--font);
      font-size: 1.2rem;
      padding: 3px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 101;
      letter-spacing: 1px;
    }
    .tt-statusbar .sb-page  { color: var(--tt-white); }
    .tt-statusbar .sb-brand { color: var(--tt-cyan); letter-spacing: 2px; }
    .tt-statusbar .sb-time  { color: var(--tt-white); }

    /* ── Header band 1: title bar ── */
    .tt-titlebar {
      background: var(--tt-black);
      border-bottom: 3px solid var(--tt-yellow);
      padding: 10px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .brand-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .tt-sprite { image-rendering: pixelated; flex-shrink: 0; }
    .brand {
      font-size: 4.8rem;
      letter-spacing: 4px;
      color: var(--tt-yellow);
      text-shadow: 3px 3px 0 #6b4400;
      line-height: 1;
    }
    .tt-titlebar .tt-right {
      text-align: right;
      font-family: var(--font);
      font-size: 1.2rem;
      line-height: 1.8;
      color: var(--tt-cyan);
    }
    .tt-page-num { font-size: 2rem; color: var(--tt-white); }

    /* ── Header band 2: subtitle ── */
    .tt-subbar {
      background: var(--tt-red);
      color: var(--tt-white);
      padding: 2px 10px;
      font-size: 1.2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .tt-updated {
      font-size: 1rem;
    }

    /* ── Nav / filter bar ── */
    .tt-nav {
      background: var(--tt-black);
      border-top: 2px solid var(--tt-red);
      border-bottom: 2px solid var(--tt-red);
      padding: 6px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 33px;
      z-index: 99;
    }

    .tt-nav-label {
      color: var(--tt-cyan);
      font-size: 1rem;
      margin-right: 2px;
      white-space: nowrap;
    }

    .tt-sep {
      color: var(--tt-red);
      font-size: 1.4rem;
      margin: 0 4px;
    }

    /* Filter buttons */
    .btn-filter {
      background: var(--tt-black);
      border: 2px solid var(--tt-red);
      color: var(--tt-white);
      font-family: var(--font);
      font-size: 1.1rem;
      padding: 1px 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: none;
    }
    .btn-filter:hover {
      background: var(--tt-red);
      color: var(--tt-yellow);
    }
    .btn-filter.active {
      background: var(--tt-red);
      border-color: var(--tt-red);
      color: var(--tt-yellow);
    }
    .btn-filter.active.cat-beer-btn   { background: var(--tt-red); border-color: var(--tt-red); color: var(--tt-yellow); }
    .btn-filter.active.cat-spirits-btn { background: var(--tt-red); border-color: var(--tt-red); color: var(--tt-cyan); }
    .btn-filter.active.store-btn { background: var(--tt-red); border-color: var(--tt-red); color: var(--tt-yellow); }

    /* Search */
    .tt-nav-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .tt-nav-search {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 8px;
    }
    .tt-search-wrap {
      flex: 1;
      min-width: 120px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tt-search-wrap label {
      color: var(--tt-cyan);
      font-size: 1rem;
      white-space: nowrap;
    }
    .tt-search-wrap input {
      flex: 1;
      background: var(--tt-black);
      border: 2px solid var(--tt-red);
      color: var(--tt-yellow);
      font-family: var(--font);
      font-size: 1.1rem;
      padding: 1px 4px;
      outline: none;
      caret-color: var(--tt-cyan);
    }
    .tt-search-wrap input::placeholder { color: #444; }

    /* Result count */
    .result-info {
      color: var(--tt-cyan);
      font-size: 1rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .result-info strong { color: var(--tt-yellow); }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
    }

    thead tr {
      background: var(--tt-red);
    }
    thead th {
      color: var(--tt-white);
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 4px 10px;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      border-right: 1px solid #aa0000;
    }
    thead th:last-child { border-right: none; }
    thead th:hover { background: #aa0000; color: var(--tt-yellow); }
    thead th.sorted { color: var(--tt-yellow); }
    thead th .sort-arrow { margin-left: 4px; }

    tbody tr:nth-child(odd)  { background: var(--tt-black); }
    tbody tr:nth-child(even) { background: #110000; }
    tbody tr:hover { background: #1a0000; }

    td {
      padding: 5px 10px;
      vertical-align: middle;
      font-size: 1.1rem;
      border-bottom: 3px solid var(--tt-red);
    }

    /* Product title */
    .title-cell a {
      color: var(--tt-cyan);
      text-decoration: underline;
      text-underline-offset: 2px;
      display: block;
      line-height: 1.3;
    }
    .title-cell a:hover { color: var(--tt-yellow); }
    .title-meta {
      display: flex;
      gap: 6px;
      margin-top: 3px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* Store badges — solid Teletext colour blocks */
    .store-badge {
      display: inline-block;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 6px;
      white-space: nowrap;
    }
    .store-morrisons { background: #ff6600; color: #fff; }
    .store-tesco     { background: #0055cc;           color: #fff; }
    .store-asda      { background: var(--tt-green);   color: #000; }

    /* Category — just teletext colours, no border */
    .cat-badge {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .cat-beer    { color: var(--tt-yellow); }
    .cat-spirits { color: var(--tt-cyan); }
    .cat-other   { color: #888; }

    /* Best deal badge */
    .best-badge {
      display: inline-block;
      background: transparent;
      color: var(--tt-yellow);
      font-size: 0.85rem;
      padding: 1px 0;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    .best-badge-star {
      color: var(--tt-yellow);
      animation: tt-flash 1s step-end infinite;
    }

    /* Deal Price (combined) */
    .deal-price-cell {
      white-space: nowrap;
      text-align: right;
    }
    .deal-promo {
      color: var(--tt-yellow);
      font-size: 1.1rem;
    }
    .deal-was {
      color: var(--tt-red2);
      font-size: 1rem;
      text-decoration: line-through;
      margin-top: 2px;
    }
    .deal-saving {
      color: var(--tt-green);
      font-size: 1rem;
      margin-top: 2px;
    }

    /* ── State messages ── */
    .state {
      text-align: center;
      padding: 60px 20px;
      color: var(--tt-cyan);
      display: none;
      font-size: 1.4rem;
    }
    .state.visible { display: block; }
    .state h3 { color: var(--tt-yellow); margin-bottom: 8px; font-size: 1.8rem; }
    .state p   { color: var(--tt-white); font-size: 1.2rem; }
    .state code { color: var(--tt-green); }

    /* ── Footer ── */
    footer {
      background: var(--tt-red);
      color: var(--tt-white);
      padding: 4px 10px;
      font-size: 1rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 4px;
      letter-spacing: 0.5px;
      margin-top: 20px;
    }
    footer span { color: var(--tt-cyan); }

    /* ── CRT overlay ── */
    @keyframes tt-flash {
      0%, 49%  { opacity: 1; }
      50%, 99% { opacity: 0; }
    }

    @keyframes flicker {
      0%   { opacity: 1; }
      19%  { opacity: 1; }
      20%  { opacity: 0.94; }
      21%  { opacity: 1; }
      49%  { opacity: 1; }
      50%  { opacity: 0.97; }
      51%  { opacity: 1; }
      74%  { opacity: 1; }
      75%  { opacity: 0.95; }
      76%  { opacity: 1; }
      100% { opacity: 1; }
    }
    .crt {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 3px
      );
      animation: flicker 6s infinite;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      html, body { font-size: 17px; }
      .brand { font-size: 3rem; letter-spacing: 2px; }
      .tt-sprite { width: 60px; height: 75px; }
      td { padding: 4px 6px; }
      table { min-width: 0; table-layout: fixed; }
      thead th:first-child { width: 58%; }
      .deal-price-cell { white-space: normal; }
    }
  </style>
</head>
<body>
<!-- Ceefax status bar -->
<div class="tt-statusbar">
  <span class="sb-page" id="sb-page">P100</span>
  <span class="sb-time" id="tt-clock">--- -- --- --:--:--</span>
</div>

<div class="page">

  <!-- Title bar -->
  <div class="tt-titlebar">
    <div class="brand-area">
      <!-- Pixel art beer mug (5px grid, 14×13) -->
      <svg class="tt-sprite" xmlns="http://www.w3.org/2000/svg" width="70" height="50" viewBox="0 0 70 50" shape-rendering="crispEdges">
        <!-- Foam -->
        <rect x="10" y="0"  width="35" height="5"  fill="#ffffff"/>
        <rect x="5"  y="5"  width="40" height="5"  fill="#ffffff"/>

        <!-- Mug top edge -->
        <rect x="5"  y="15" width="5"  height="5"  fill="#cc8800"/>
        <rect x="10" y="15" width="30" height="5"  fill="#ff9900"/>
        <rect x="40" y="15" width="5"  height="5"  fill="#cc8800"/>
        <!-- Mug rows with shadow stripes + handle -->
        <rect x="5"  y="20" width="5"  height="5"  fill="#cc8800"/>
        <rect x="10" y="20" width="5"  height="5"  fill="#aa6600"/>
        <rect x="15" y="20" width="10" height="5"  fill="#ff9900"/>
        <rect x="25" y="20" width="5"  height="5"  fill="#aa6600"/>
        <rect x="30" y="20" width="10" height="5"  fill="#ff9900"/>
        <rect x="40" y="20" width="5"  height="5"  fill="#cc8800"/>
        <rect x="45" y="20" width="10" height="5"  fill="#cc8800"/>
        <rect x="5"  y="25" width="5"  height="5"  fill="#cc8800"/>
        <rect x="10" y="25" width="5"  height="5"  fill="#aa6600"/>
        <rect x="15" y="25" width="10" height="5"  fill="#ff9900"/>
        <rect x="25" y="25" width="5"  height="5"  fill="#aa6600"/>
        <rect x="30" y="25" width="10" height="5"  fill="#ff9900"/>
        <rect x="40" y="25" width="5"  height="5"  fill="#cc8800"/>
        <rect x="55" y="25" width="5"  height="5"  fill="#cc8800"/>
        <rect x="5"  y="30" width="5"  height="5"  fill="#cc8800"/>
        <rect x="10" y="30" width="5"  height="5"  fill="#aa6600"/>
        <rect x="15" y="30" width="10" height="5"  fill="#ff9900"/>
        <rect x="25" y="30" width="5"  height="5"  fill="#aa6600"/>
        <rect x="30" y="30" width="10" height="5"  fill="#ff9900"/>
        <rect x="40" y="30" width="5"  height="5"  fill="#cc8800"/>
        <rect x="55" y="30" width="5"  height="5"  fill="#cc8800"/>
        <rect x="5"  y="35" width="5"  height="5"  fill="#cc8800"/>
        <rect x="10" y="35" width="5"  height="5"  fill="#aa6600"/>
        <rect x="15" y="35" width="10" height="5"  fill="#ff9900"/>
        <rect x="25" y="35" width="5"  height="5"  fill="#aa6600"/>
        <rect x="30" y="35" width="10" height="5"  fill="#ff9900"/>
        <rect x="40" y="35" width="5"  height="5"  fill="#cc8800"/>
        <rect x="45" y="35" width="10" height="5"  fill="#cc8800"/>
        <!-- Lower mug body -->
        <rect x="5"  y="40" width="5"  height="5"  fill="#cc8800"/>
        <rect x="10" y="40" width="30" height="5"  fill="#ee8800"/>
        <rect x="40" y="40" width="5"  height="5"  fill="#cc8800"/>
        <!-- Mug bottom -->
        <rect x="5"  y="45" width="40" height="5"  fill="#cc8800"/>
      </svg>
      <div class="brand">BOOZE NEWZ</div>
    </div>
  </div>

  <!-- Subtitle bar -->
  <div class="tt-subbar">
    <div class="tt-updated">UPDATED: <span id="updated-time">--/--/----</span></div>
  </div>

  <!-- Nav / filters -->
  <div class="tt-nav">
    <div class="tt-nav-filters">
      <div id="cat-filters" style="display:flex;gap:4px;flex-wrap:wrap;">
        <button class="btn-filter active" data-cat="all">ALL</button>
        <button class="btn-filter cat-beer-btn" data-cat="beer">BEER</button>
        <button class="btn-filter cat-spirits-btn" data-cat="spirits">SPIRITS</button>
      </div>

      <div id="store-filters" style="display:flex;gap:4px;flex-wrap:wrap;">
        <button class="btn-filter store-btn active" data-store="all">ALL</button>
      </div>
    </div>

    <div class="tt-nav-search">
      <div class="tt-search-wrap">
        <label for="search">SEARCH:</label>
        <input type="search" id="search" placeholder="TYPE HERE" autocomplete="off" />
      </div>
      <div class="result-info" id="result-info"></div>
    </div>
  </div>

  <!-- States -->
  <div class="state visible" id="state-loading">
    <h3>>>> LOADING <<<</h3>
    <p>FETCHING THE LATEST BARGAINS...</p>
  </div>
  <div class="state" id="state-empty">
    <h3>NO DEALS FOUND</h3>
    <p>TRY ADJUSTING YOUR FILTERS OR SEARCH</p>
  </div>
  <div class="state" id="state-error">
    <h3>*** ERROR ***</h3>
    <p id="error-msg">RUN <code>python3 scraper.py</code> TO GENERATE DEALS</p>
  </div>

  <!-- Deals table -->
  <div class="table-wrap" id="table-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th data-sort="title" style="width:65%">PRODUCT <span class="sort-arrow"></span></th>
          <th data-sort="saving" class="sorted">DEAL PRICE ▼ <span class="sort-arrow"></span></th>
        </tr>
      </thead>
      <tbody id="deals-body"></tbody>
    </table>
  </div>

  <!-- Footer -->
  <footer>
    <div>BOOZENEWZ &mdash; PRICES FROM PUBLIC UK SUPERMARKET WEBSITES</div>
    <div><span id="footer-count"></span></div>
  </footer>

</div><!-- .page -->
<div class="crt"></div>

<script>
  const $ = id => document.getElementById(id);
  const PAGE_SIZE = 60;

  let allDeals = [];
  let visibleDeals = [];
  let renderedCount = 0;
  let sortKey = 'saving';
  let sortDir = -1;
  let activeCat = 'all';
  let activeStore = 'all';

  // ── Live clock (Ceefax style: "Thu 26 Mar 11:52:26") ────────────────────
  const DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function tick() {
    const n = new Date();
    const d = `${DAYS[n.getDay()]} ${n.getDate()} ${MONTHS[n.getMonth()]}`;
    const t = n.toLocaleTimeString('en-GB');
    $('tt-clock').textContent = `${d} ${t}`;
  }
  tick();
  setInterval(tick, 1000);
  $('sb-page').textContent = 'P' + (Math.floor(Math.random() * 401) + 100);

  // ── Sentinel for infinite scroll ─────────────────────────────────────────
  const sentinel = document.createElement('div');
  sentinel.id = 'scroll-sentinel';
  document.querySelector('.table-wrap').after(sentinel);
  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) appendRows();
  }, { rootMargin: '300px' });
  observer.observe(sentinel);

  // ── Load data ────────────────────────────────────────────────────────────
  async function load() {
    try {
      const res = await fetch('deals.json?t=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allDeals = data.deals || [];

      const updated = data.updated ? new Date(data.updated) : null;
      $('updated-time').textContent = updated
        ? updated.toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' }).toUpperCase()
        : '--/--/----';

      buildStoreFilters();
      render();
    } catch (e) {
      show('state-error');
      $('error-msg').textContent = e.message;
    }
  }

  // ── Build store filter buttons ────────────────────────────────────────────
  function buildStoreFilters() {
    const stores = [...new Set(allDeals.map(d => d.store))].sort();
    const container = $('store-filters');
    stores.forEach(store => {
      const btn = document.createElement('button');
      btn.className = 'btn-filter store-btn';
      btn.dataset.store = store;
      btn.textContent = store.toUpperCase();
      container.appendChild(btn);
    });
  }

  // ── Filter + sort, then render first batch ───────────────────────────────
  function render() {
    hide('state-loading'); hide('state-empty'); hide('state-error');

    const q = $('search').value.trim().toLowerCase();
    visibleDeals = allDeals.filter(d => {
      if (!(parseFloat(d.saving) > 0)) return false;
      if (/\b(any|buy)\s+\d+\s+for\s+/i.test(d.promotion || '')) return false;
      if (/\bginger\s+beer\b/i.test(d.title)) return false;
      if (d.category === 'beer' && /\b(non[- ]?alcoholic|alcohol[- ]?free|0\.0%|0%)\b/i.test(d.title)) return false;
      if (activeCat !== 'all' && d.category !== activeCat) return false;
      if (activeStore !== 'all' && d.store !== activeStore) return false;
      if (q && !d.title.toLowerCase().includes(q) && !(d.promotion || '').toLowerCase().includes(q)) return false;
      return true;
    });

    visibleDeals.sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (typeof av === 'string') av = av.replace(/[^0-9.]/g, '') || av;
      if (typeof bv === 'string') bv = bv.replace(/[^0-9.]/g, '') || bv;
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return sortDir * (an - bn);
      return sortDir * String(av).localeCompare(String(bv));
    });

    if (visibleDeals.length === 0) {
      $('table-wrap').style.display = 'none';
      show('state-empty');
      $('result-info').textContent = '0 DEALS';
      return;
    }

    $('table-wrap').style.display = '';
    $('result-info').innerHTML = `<strong>${visibleDeals.length.toLocaleString()}</strong> DEALS`;
    $('footer-count').textContent = `${allDeals.length.toLocaleString()} TOTAL DEALS`;

    $('deals-body').innerHTML = '';
    renderedCount = 0;
    computeBestDeals(visibleDeals);
    // Pin best deals to top, then the rest in sort order
    visibleDeals = [
      ...visibleDeals.filter(d => d._bestLabel),
      ...visibleDeals.filter(d => !d._bestLabel),
    ];
    appendRows();
  }

  // ── Detect spirit subtype from title (word-boundary safe) ────────────────
  const SPIRIT_TYPES = [
    { key: 'whisky',   re: /\b(whisk[ey]|bourbon|scotch|malt)\b/i },
    { key: 'gin',      re: /\bgin\b/i },
    { key: 'vodka',    re: /\bvodka\b/i },
    { key: 'rum',      re: /\brum\b/i },
    { key: 'tequila',  re: /\btequila\b/i },
    { key: 'brandy',   re: /\b(brandy|cognac|armagnac)\b/i },
    { key: 'liqueur',  re: /\bliqueur\b/i },
    { key: 'cider',    re: /\bcider\b/i },
    { key: 'beer',     re: /\b(beer|lager|ale|stout|ipa)\b/i },
  ];

  function dealSubtype(d) {
    const t = (d.title + ' ' + (d.promotion || '')).toLowerCase();
    if (d.category === 'beer') {
      // Check cider first before defaulting to beer
      if (/\bcider\b/i.test(t)) return 'cider';
      return 'beer';
    }
    for (const { key, re } of SPIRIT_TYPES) {
      if (re.test(t)) return key;
    }
    return 'spirits';
  }

  // ── Compute best deal per subtype (by % saving) ───────────────────────────
  function computeBestDeals(deals) {
    // Clear previous badges
    for (const d of allDeals) delete d._bestLabel;
    const best = {};
    for (const d of deals) {
      const pct = parseFloat(d.saving) / parseFloat((d.price || '0').replace(/[^0-9.]/g, ''));
      if (!isFinite(pct) || pct <= 0) continue;
      const sub = dealSubtype(d);
      if (!best[sub] || pct > best[sub].pct) best[sub] = { d, pct };
    }
    for (const [sub, { d }] of Object.entries(best)) {
      d._bestLabel = SUBTYPE_LABEL[sub];
    }
  }

  const SUBTYPE_LABEL = {
    whisky: 'BEST WHISKY', gin: 'BEST GIN', vodka: 'BEST VODKA',
    rum: 'BEST RUM', tequila: 'BEST TEQUILA', brandy: 'BEST BRANDY',
    liqueur: 'BEST LIQUEUR', cider: 'BEST CIDER', beer: 'BEST BEER',
  };

  // ── Append next batch ────────────────────────────────────────────────────
  function appendRows() {
    const batch = visibleDeals.slice(renderedCount, renderedCount + PAGE_SIZE);
    if (batch.length === 0) return;

    const frag = document.createDocumentFragment();
    batch.forEach(d => {
      const tr = document.createElement('tr');
      const savingNum = parseFloat(d.saving) || 0;
      const savingHtml = savingNum > 0
        ? `<span class="saving-pill">-£${savingNum.toFixed(2)}</span>`
        : `<span class="saving-pill zero">---</span>`;
      const storeCls = 'store-' + (d.store || '').toLowerCase().replace(/[^a-z]/g, '');
      const cat = d.category || 'other';
      tr.innerHTML = `
        <td class="title-cell">
          ${d._bestLabel ? `<div class="best-badge"><span class="best-badge-star">★</span> ${d._bestLabel} DEAL <span class="best-badge-star">★</span></div>` : ''}
          <a href="${esc(d.link)}" target="_blank" rel="noopener">${esc(d.title)}</a>
          <div class="title-meta">
            <span class="store-badge ${storeCls}">${esc(d.store)}</span>
            <span class="cat-badge cat-${cat}">${cat.toUpperCase()}</span>
          </div>
        </td>
        <td class="deal-price-cell">
          <div class="deal-promo">${esc(d.promotion)}</div>
          ${d.price && !/\bwas\b/i.test(d.promotion || '') ? `<div class="deal-was">${esc(d.price)}</div>` : ''}
          ${savingNum > 0 ? `<div class="deal-saving">-£${savingNum.toFixed(2)}</div>` : ''}
        </td>
      `;
      frag.appendChild(tr);
    });
    $('deals-body').appendChild(frag);
    renderedCount += batch.length;
  }

  // ── Events ───────────────────────────────────────────────────────────────
  $('cat-filters').addEventListener('click', e => {
    const btn = e.target.closest('[data-cat]');
    if (!btn) return;
    activeCat = btn.dataset.cat;
    $('cat-filters').querySelectorAll('.btn-filter').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });

  $('store-filters').addEventListener('click', e => {
    const btn = e.target.closest('[data-store]');
    if (!btn) return;
    activeStore = btn.dataset.store;
    $('store-filters').querySelectorAll('.btn-filter').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });

  let searchTimer;
  $('search').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(render, 180);
  });

  document.querySelector('thead').addEventListener('click', e => {
    const th = e.target.closest('[data-sort]');
    if (!th) return;
    const key = th.dataset.sort;
    sortDir = (key === sortKey) ? sortDir * -1 : (key === 'saving' ? -1 : 1);
    sortKey = key;
    document.querySelectorAll('thead th').forEach(h => {
      h.classList.remove('sorted');
      const arrow = h.querySelector('.sort-arrow');
      if (arrow) arrow.textContent = '';
    });
    th.classList.add('sorted');
    const arr = th.querySelector('.sort-arrow');
    if (arr) arr.textContent = sortDir === -1 ? '▼' : '▲';
    render();
  });

  // ── Helpers ──────────────────────────────────────────────────────────────
  function show(id) { $(id).classList.add('visible'); }
  function hide(id) { $(id).classList.remove('visible'); }
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  load();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
